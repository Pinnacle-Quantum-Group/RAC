# tinygrad comparison config — TinyLlama-1.1B-Chat-v1.0
#
# run_tinygrad.py reads this and auto-pip-installs tinygrad if missing.
# Uses tinygrad's CLANG (CPU JIT) backend for a fair CPU-vs-CPU compare
# against RAC on the Ryzen 9 5950X.

hf_model_id: TinyLlama/TinyLlama-1.1B-Chat-v1.0

# Per-layer scaling divisor (same as llama.cpp config)
n_layers_divisor: 22

# Scenarios
prefill_tokens: 128
decode_iters:   100

# Backend selection (run_tinygrad.py probes available ones and falls back).
#   Prefer    GPU: HIP (AMD), CUDA/NV (NVIDIA), METAL (Apple)
#   CPU JIT:       CPU  (tinygrad 0.11+)  /  CLANG (tinygrad <=0.10)
#   debug:         PYTHON
# 'CPU' is the modern name; if you set CLANG on a 0.11+ install we auto-map
# it to CPU. Set 'HIP' or 'CUDA' to pull the GPU in for A/B vs RAC.
device: CPU

# Precision
dtype: float32        # float32 for apples-to-apples with RAC

# Threading env vars (applied via os.environ before tinygrad import)
env:
  OMP_NUM_THREADS: 16
  TINYGRAD_CLANG_PARALLEL: 1
  JIT: 1
